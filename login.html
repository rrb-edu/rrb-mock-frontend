<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RRB Login</title>

  <style>
    body{
      font-family:Arial;
      background:#f1f5f9;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-box{
      background:white;
      padding:40px;
      width:420px;
      border-radius:20px;
      box-shadow:0 10px 30px #0002;
    }

    h1{
      text-align:center;
      color:#2563eb;
      margin-bottom:25px;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:17px;
    }

    button{
      width:100%;
      padding:14px;
      background:#2563eb;
      color:white;
      border:none;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
      margin-bottom:12px;
    }

    .signup{
      background:#16a34a;
    }
  </style>
</head>

<body>

<div class="login-box">

  <h1>RRB Mock Test Login</h1>

  <input type="text" id="name" placeholder="Enter Name">
  <input type="text" id="roll" placeholder="Enter Roll Number">
  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button class="signup" onclick="signupUser()">Signup</button>
  <button onclick="loginUser()">Login</button>

</div>

<script>
const API_URL = "http://localhost:5000/api/auth";

async function signupUser(){

  const name = document.getElementById("name").value;
  const roll = document.getElementById("roll").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!name || !roll || !email || !password){
    alert("Please fill all fields");
    return;
  }

  const res = await fetch(API_URL + "/signup", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name,
      roll,
      email,
      password
    })
  });

  const data = await res.json();

  alert(data.message);
}

async function loginUser(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Please enter email and password");
    return;
  }

  const res = await fetch(API_URL + "/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email,
      password
    })
  });

  const data = await res.json();

  if(data.token){

    localStorage.setItem("token", data.token);
    localStorage.setItem("candidateName", data.user.name);
    localStorage.setItem(
  "candidateEmail",
  data.user.email
);
    localStorage.setItem(
  "isPremium",
  data.user.isPremium
);
    document.getElementById("email").value = "";
     document.getElementById("password").value = "";
    window.location.href = "dashboard.html";

  }
  else{
    alert(data.message);
  }
  document.getElementById("name").value = "";
document.getElementById("roll").value = "";
document.getElementById("email").value = "";
document.getElementById("password").value = "";
}
</script>

</body>
</html>
