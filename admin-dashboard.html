<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>

body{
  font-family:Arial;
  background:#f1f5f9;
  padding:30px;
}

.container{
  max-width:1200px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:20px;
}

h1{
  color:#2563eb;
  margin-bottom:25px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-bottom:30px;
}

.card{
  background:#eff6ff;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

.card h2{
  font-size:40px;
  color:#2563eb;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:15px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

th{
  background:#2563eb;
  color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

  <div class="search-box">

  <div class="search-container">

  <div class="search-box">

    <span class="search-icon">🔍</span>

    <input
      type="text"
      id="searchInput"
      placeholder="Search by name or roll number..."
      onkeyup="searchStudent()"
    >

    <span class="mic-icon">🎤</span>

  </div>
<button
  class="search-btn"
  onclick="searchStudent()"
>
  Search
</button>

</div>

</div>

<div class="stats">

<div class="card">
  <h3>Total Students</h3>
  <h2 id="students">0</h2>
</div>

<div class="card">
  <h3>Total Exams</h3>
  <h2 id="exams">0</h2>
</div>

<div class="card">
  <h3>Highest Score</h3>
  <h2 id="highest">0</h2>
</div>

</div>

<table>
<thead>
<tr>
  <th>Name</th>
  <th>Roll</th>
  <th>Score</th>
  <th>Percentage</th>
  <th>Action</th>
</tr>
</thead>

<tbody id="resultBody"></tbody>

</table>

</div>

<script>
  if(localStorage.getItem("adminLoggedIn") !== "yes"){
  window.location.href = "admin-login.html";
}
let allResults = [];
function searchStudent(){

  let search =
    document.getElementById("searchInput").value.toLowerCase();

  let body =
    document.getElementById("resultBody");

  body.innerHTML = "";

  let filtered =
    allResults.filter(r =>
      r.name.toLowerCase().includes(search) ||
      r.roll.includes(search)
    );

  filtered.forEach(r => {

 body.innerHTML += `
  <tr>
    <td>${r.name}</td>
    <td>${r.roll}</td>
    <td>${r.score}</td>
    <td>${r.percentage}%</td>
    <td>
      <button
        class="delete-btn"
        onclick="deleteResult('${r._id}')"
      >
        Delete
      </button>
    </td>
  </tr>
`;

  });

}
async function deleteResult(id){

  const confirmDelete =
    confirm("Are you sure you want to delete this result?");

  if(!confirmDelete) return;

  const res = await fetch(
    "http://localhost:5000/api/results/delete/" + id,
    {
      method: "DELETE"
    }
  );

  const data = await res.json();

  alert(data.message);

  location.reload();
}
async function loadAdminData(){
  const res =
    await fetch("http://localhost:5000/api/results/leaderboard");

  const results =
    await res.json();
  allResults = results;
  document.getElementById("exams").innerText =
    results.length;

  const uniqueStudents =
    [...new Set(results.map(r => r.roll))];

  document.getElementById("students").innerText =
    uniqueStudents.length;

  if(results.length > 0){

    const highest =
      Math.max(...results.map(r => r.score));

    document.getElementById("highest").innerText =
      highest;

  }

  let body =
    document.getElementById("resultBody");

  results.forEach(r => {

  body.innerHTML += `
  <tr>
    <td>${r.name}</td>
    <td>${r.roll}</td>
    <td>${r.score}</td>
    <td>${r.percentage}%</td>
    <td>
      <button
        class="delete-btn"
        onclick="deleteResult('${r._id}')"
      >
        Delete
      </button>
    </td>
  </tr>
`;

  });

}

loadAdminData();

</script>

</body>
</html>
