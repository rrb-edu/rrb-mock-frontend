<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam History</title>

<style>

body{
  font-family:Arial;
  background:#f1f5f9;
  padding:30px;
}

.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:20px;
}

h1{
  color:#2563eb;
  margin-bottom:25px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:15px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

th{
  background:#2563eb;
  color:white;
}

.score{
  font-weight:bold;
}

.green{
  color:#16a34a;
}

.red{
  color:#dc2626;
}

</style>
</head>

<body>

<div class="container">

<h1>My Exam History</h1>

<table>

<thead>
<tr>
  <th>Date</th>
  <th>Score</th>
  <th>Percentage</th>
  <th>Correct</th>
  <th>Wrong</th>
  <th>Unanswered</th>
</tr>
</thead>

<tbody id="historyBody"></tbody>

</table>

</div>

<script>

async function loadHistory(){

  const roll =
    localStorage.getItem("candidateRoll");

  const res =
    await fetch(
      "http://localhost:5000/api/results/leaderboard"
    );

  const results =
    await res.json();

  const myResults =
    results.filter(r => r.roll === roll);

  let body =
    document.getElementById("historyBody");

  body.innerHTML = "";

  myResults.forEach(r => {

    body.innerHTML += `
      <tr>

        <td>
          ${new Date(r.createdAt)
            .toLocaleString()}
        </td>

        <td class="score ${
          r.score >= 0 ? "green" : "red"
        }">

          ${r.score}

        </td>

        <td>
          ${r.percentage}%
        </td>

        <td>
          ${r.correct}
        </td>

        <td>
          ${r.wrong}
        </td>

        <td>
          ${r.unanswered}
        </td>

      </tr>
    `;

  });

}

loadHistory();

</script>

</body>
</html>
