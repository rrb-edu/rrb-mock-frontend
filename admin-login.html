<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:40px;
  width:400px;
  border-radius:20px;
  box-shadow:0 10px 30px #0002;
}

h1{
  color:#2563eb;
  text-align:center;
}

input{
  width:100%;
  padding:15px;
  margin:12px 0;
  border:1px solid #ccc;
  border-radius:10px;
  font-size:18px;
}

button{
  width:100%;
  padding:15px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h1>Admin Login</h1>

<input type="text" id="adminUser" placeholder="Admin Username">
<input type="password" id="adminPass" placeholder="Admin Password">

<button onclick="adminLogin()">Login</button>

</div>

<script>
function adminLogin(){

  const user = document.getElementById("adminUser").value;
  const pass = document.getElementById("adminPass").value;

  if(user === "admin" && pass === "admin123"){

    localStorage.setItem("adminLoggedIn", "yes");

    window.location.href = "admin-dashboard.html";

  }
  else{
    alert("Invalid admin login");
  }

}
</script>

</body>
</html>
