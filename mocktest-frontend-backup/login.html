<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRB EDU Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',Arial,sans-serif;
}

body{
  height:100vh;
  background:linear-gradient(135deg,#0f172a,#2563eb,#7c3aed);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  padding:10px;
}

.circle{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.12);
  animation:float 8s infinite ease-in-out;
}

.c1{width:220px;height:220px;top:8%;left:8%;}
.c2{width:160px;height:160px;bottom:10%;right:12%;}
.c3{width:100px;height:100px;top:70%;left:18%;}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-30px);}
}

.login-card{
  width:410px;
  max-height:98vh;
  background:rgba(255,255,255,0.14);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:24px;
  padding:20px 28px;
  color:white;
  box-shadow:0 25px 60px rgba(0,0,0,0.35);
  z-index:10;
  display: flex;
  flex-direction: column;
}

.logo{
  text-align:center;
  margin-bottom:15px;
}

.logo h1{
  font-size:30px;
}

.logo p{
  opacity:0.85;
  margin-top:4px;
  font-size:14px;
}

.tabs{
  display:flex;
  background:rgba(255,255,255,0.16);
  border-radius:12px;
  padding:4px;
  margin-bottom:15px;
}

.tabs button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:9px;
  background:transparent;
  color:white;
  font-size:15px;
  cursor:pointer;
}

.tabs button.active{
  background:white;
  color:#2563eb;
  font-weight:bold;
}

.form{
  display:none;
}

.form.active{
  display:block;
}

.badge{
  text-align:center;
  margin-bottom:15px;
  background:rgba(255,255,255,0.18);
  padding:8px;
  border-radius:12px;
  font-size:13px;
}

.input-box{
  margin-bottom:10px;
}

.input-box input{
  width:100%;
  padding:11px 14px;
  border:none;
  outline:none;
  border-radius:12px;
  font-size:15px;
}

.main-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#facc15,#f97316);
  color:#111827;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  margin-bottom:5px;
}

.main-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.footer-text{
  text-align:center;
  margin-top:10px;
  font-size:13px;
  opacity:0.9;
}

@media(max-width:500px){
  .login-card{
    width:100%;
    padding:18px 20px;
  }
}
</style>
</head>

<body>

<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="circle c3"></div>

<div class="login-card">

  <div class="logo">
    <h1>RRB EDU</h1>
    <p>India's Smart CBT Mock Test Platform</p>
  </div>

  <div class="badge">
    🚀 Practice • Analyze • Improve • Succeed
  </div>

  <div class="tabs">
    <button id="loginTab" class="active" onclick="showLogin()">Login</button>
    <button id="signupTab" onclick="showSignup()">Signup</button>
  </div>

  <div id="loginForm" class="form active">
    <div class="input-box">
      <input type="email" id="loginEmail" placeholder="Email Address">
    </div>

    <div class="input-box">
      <input type="password" id="loginPassword" placeholder="Password">
    </div>

    <button class="main-btn" onclick="loginUser()">
      Login Now
    </button>
  </div>

  <div id="signupForm" class="form">
    <div class="input-box">
      <input type="text" id="signupName" placeholder="Full Name">
    </div>

    <div class="input-box">
      <input type="text" id="signupRoll" placeholder="Roll Number">
    </div>

    <div class="input-box">
      <input type="email" id="signupEmail" placeholder="Email Address">
    </div>

    <div class="input-box">
      <input type="password" id="signupPassword" placeholder="Create Password">
    </div>

    <button class="main-btn" onclick="signupUser()">
      Create Account
    </button>
  </div>

  <div class="footer-text">
    Trusted CBT practice platform for railway aspirants
  </div>

</div>

<script>
const API_URL =
  "https://rrb-mock-backend.onrender.com/api/auth";

function showLogin(){
  document.getElementById("loginForm").classList.add("active");
  document.getElementById("signupForm").classList.remove("active");

  document.getElementById("loginTab").classList.add("active");
  document.getElementById("signupTab").classList.remove("active");
}

function showSignup(){
  document.getElementById("signupForm").classList.add("active");
  document.getElementById("loginForm").classList.remove("active");

  document.getElementById("signupTab").classList.add("active");
  document.getElementById("loginTab").classList.remove("active");
}

async function signupUser(){

  const name =
    document.getElementById("signupName").value;

  const roll =
    document.getElementById("signupRoll").value;

  const email =
    document.getElementById("signupEmail").value;

  const password =
    document.getElementById("signupPassword").value;

  if(!name || !roll || !email || !password){
    alert("Please fill all fields");
    return;
  }

  const res = await fetch(API_URL + "/signup", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      name,
      roll,
      email,
      password
    })
  });

  const data = await res.json();

  alert(data.message);

  if(data.message === "Signup successful"){
    showLogin();
  }
}

async function loginUser(){

  const email =
    document.getElementById("loginEmail").value;

  const password =
    document.getElementById("loginPassword").value;

  if(!email || !password){
    alert("Please enter email and password");
    return;
  }

  const res = await fetch(API_URL + "/login", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      email,
      password
    })
  });

  const data = await res.json();

  if(data.token){

    localStorage.setItem("token", data.token);
    localStorage.setItem("candidateName", data.user.name);
    localStorage.setItem("candidateRoll", data.user.roll);
    localStorage.setItem("candidateEmail", data.user.email);
    localStorage.setItem("isPremium", data.user.isPremium);

    window.location.href = "dashboard.html";

  }
  else{
    alert(data.message);
  }
}
</script>

</body>
</html>
