<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',Arial,sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f172a,#2563eb,#7c3aed);
  padding:30px;
  color:white;
}

.dashboard{
  max-width:1150px;
  margin:auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.header h1{
  font-size:36px;
}

.badge{
  padding:12px 22px;
  border-radius:30px;
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(14px);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-bottom:25px;
}

.card{
  background:rgba(255,255,255,0.16);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:24px;
  padding:25px;
  box-shadow:0 20px 45px rgba(0,0,0,0.25);
}

.card h3{
  font-size:16px;
  opacity:.8;
  margin-bottom:10px;
}

.card p{
  font-size:28px;
  font-weight:bold;
}

.actions{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  margin:30px 0;
}

button{
  border:none;
  padding:18px;
  border-radius:18px;
  color:white;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 30px rgba(0,0,0,.3);
}

.free{
  background:linear-gradient(135deg,#22c55e,#16a34a);
}

.premium{
  background:linear-gradient(135deg,#f59e0b,#f97316);
}

.upgrade{
  background:linear-gradient(135deg,#a855f7,#7c3aed);
}

.history{
  background:linear-gradient(135deg,#06b6d4,#2563eb);
}

.logout{
  background:linear-gradient(135deg,#ef4444,#dc2626);
}

.section-title{
  margin:25px 0 15px;
  font-size:24px;
}

.note{
  text-align:center;
  margin-top:20px;
  opacity:.8;
}

@media(max-width:600px){
  body{
    padding:18px;
  }

  .header{
    flex-direction:column;
    gap:15px;
    text-align:center;
  }

  .header h1{
    font-size:28px;
  }
}
</style>
</head>

<body>

<div class="dashboard">

  <div class="header">
    <div>
      <h1>RRB EDU Dashboard</h1>
      <p>Welcome back, <span id="name"></span></p>
    </div>

    <div class="badge" id="premium">
      Free User
    </div>
    <div class="card">
  <h3>Premium Remaining</h3>
  <p id="premiumCountdown">--</p>
</div>
  </div>

  <div class="grid">

    <div class="card">
      <h3>Roll Number</h3>
      <p id="roll"></p>
    </div>

    <div class="card">
      <h3>Total Exams Taken</h3>
      <p id="totalExams">0</p>
    </div>

    <div class="card">
      <h3>Best Score</h3>
      <p id="bestScore">0</p>
    </div>

    <div class="card">
      <h3>Latest Score</h3>
      <p id="latestScore">0</p>
    </div>
     <div class="card">
    <h3>Your Rank</h3>
    <p id="myRank">-</p>
  </div>

  </div>

  <h2 class="section-title">Available Tests</h2>

  <div class="actions">

    <button class="free" onclick="startFreeTest()">
      Free Mock Test
    </button>

    <button class="premium" onclick="startPremiumTest()">
      Premium Mock Test 🔒
    </button>

    <button class="upgrade" onclick="upgradePremium()">
      Upgrade to Premium
    </button>

    <button class="history" onclick="location.href='history.html'">
      View Exam History
    </button>

    <button class="logout" onclick="logoutUser()">
      Logout
    </button>

  </div>

  <p class="note">
    Practice daily • Track your progress • Unlock premium tests
  </p>

</div>

<script>
document.getElementById("name").innerText =
  localStorage.getItem("candidateName") || "Student";

document.getElementById("roll").innerText =
  localStorage.getItem("candidateRoll") || "-";

const premiumStatus =
  localStorage.getItem("isPremium");

if(premiumStatus === "true"){
const expiry =
  localStorage.getItem("premiumExpiry");

document.getElementById("premium").innerHTML =
  "🌟 Premium User<br>Expires: " +
  new Date(expiry).toLocaleDateString();
}
else{
  document.getElementById("premium").innerHTML =
    "Free User";
}

function startFreeTest(){
  localStorage.setItem("selectedTest", "free");
  window.location.href = "instructions.html";
}

function startPremiumTest(){

  const isPremium =
    localStorage.getItem("isPremium");

  if(isPremium === "true"){
    localStorage.setItem("selectedTest", "premium");
    window.location.href = "instructions.html";
  }
  else{
    alert("This is a premium mock test. Please upgrade to premium.");
  }
}

function logoutUser(){
  localStorage.clear();
  window.location.href = "login.html";
}

async function loadMyStats(){

  const roll =
    localStorage.getItem("candidateRoll");

  const res =
    await fetch("https://rrb-mock-backend.onrender.com/api/results/leaderboard");

  const results =
    await res.json();
    const sortedResults =
  results.sort((a,b) => b.score - a.score);

const myRoll =
  localStorage.getItem("candidateRoll");

const rankIndex =
  sortedResults.findIndex(r => r.roll === myRoll);

document.getElementById("myRank").innerText =
  rankIndex >= 0 ? "#" + (rankIndex + 1) : "-";

  const myResults =
    results.filter(r => r.roll === roll);

  document.getElementById("totalExams").innerText =
    myResults.length;

  if(myResults.length > 0){

    const best =
      Math.max(...myResults.map(r => r.score));

    document.getElementById("bestScore").innerText =
      best;

    document.getElementById("latestScore").innerText =
      myResults[0].score;
  }
}

async function upgradePremium(){

  const orderRes = await fetch(
    "https://rrb-mock-backend.onrender.com/api/payment/create-order",
    { method: "POST" }
  );

  const order = await orderRes.json();

  const options = {
    key: "rzp_live_SukncxAHKM6fcB",
    amount: order.amount,
    currency: order.currency,
    name: "RRB Mock Test",
    description: "Premium Mock Test Access",
    order_id: order.id,

    handler: async function(response){

      alert("Payment Successful");

      const email =
        localStorage.getItem("candidateEmail");

      const res = await fetch(
        "https://rrb-mock-backend.onrender.com/api/auth/activate-premium",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email })
        }
      );

      const data = await res.json();

      localStorage.setItem(
        "isPremium",
        data.user.isPremium
      );

      fetch(
        "https://rrb-mock-backend.onrender.com/api/payments/save",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name: localStorage.getItem("candidateName"),
            email: localStorage.getItem("candidateEmail"),
            amount: 99,
            paymentId: response.razorpay_payment_id,
            orderId: response.razorpay_order_id
          })
        }
      );

      alert("Premium Activated Successfully");
      location.reload();
    },

    theme: {
      color: "#2563eb"
    }
  };

  const rzp = new Razorpay(options);
  rzp.open();
}

loadMyStats();


const expiry =
  localStorage.getItem("premiumExpiry");

if(expiry){

  const now = new Date();

  const end = new Date(expiry);

  const diff =
    end - now;

  const days =
    Math.max(
      0,
      Math.ceil(diff / (1000 * 60 * 60 * 24))
    );

  document.getElementById(
    "premiumCountdown"
  ).innerText =
    days + " Days";
}
</script>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>
</html>
