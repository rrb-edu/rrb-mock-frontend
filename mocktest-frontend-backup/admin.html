<!DOCTYPE html>
<html>
<head>
  <title>Admin Question Panel</title>

  <style>
    body{
      font-family:Arial;
      background:#f1f5f9;
      padding:40px;
    }

    .box{
      max-width:850px;
      margin:auto;
      background:white;
      padding:35px;
      border-radius:20px;
      box-shadow:0 10px 30px #0002;
    }

    h1{
      color:#2563eb;
      text-align:center;
      margin-bottom:25px;
    }

    input, textarea, select{
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:17px;
    }

    textarea{
      height:100px;
      resize:none;
    }

    button{
      padding:14px 25px;
      border:none;
      background:#2563eb;
      color:white;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
      margin:5px;
    }

    .danger{
      background:#dc2626;
    }

    .success{
      background:#16a34a;
    }

    .question-list{
      margin-top:30px;
    }

    .q-card{
      background:#f8fafc;
      padding:18px;
      border-radius:12px;
      margin-bottom:15px;
      border-left:5px solid #2563eb;
    }

    select{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #ccc;
}
  </style>
</head>

<body>

<div class="box">

  <h1>Admin Question Upload Panel</h1>
  <input type="file" id="pdfFile" accept="application/pdf">
<button onclick="readPDF()">Read PDF</button>
<button class="success" onclick="importPDFQuestions()">
  Import PDF Questions
</button>

<textarea id="pdfText" placeholder="PDF text will appear here"></textarea>

  <textarea id="question" placeholder="Enter Question"></textarea>

  <input id="option1" placeholder="Option 1">
  <input id="option2" placeholder="Option 2">
  <input id="option3" placeholder="Option 3">
  <input id="option4" placeholder="Option 4">

 <select id="answer">
  <option value="">Select Correct Answer</option>
  <option value="0">Option 1</option>
  <option value="1">Option 2</option>
  <option value="2">Option 3</option>
  <option value="3">Option 4</option>
</select>

<input type="text" id="image" placeholder="Paste Image URL (optional)">
<select id="category">
  <option value="">Select Category</option>
  <option>General Awareness</option>
  <option>Maths</option>
  <option>Reasoning</option>
  <option>General Science</option>
</select>
<select id="testType">

  <option value="free">
    Free Test
  </option>

  <option value="premium">
    Premium Test
  </option>

</select>

  <button class="success" onclick="addQuestion()">Add Question</button>
  <button onclick="location.href='login.html'">Go to Exam</button>
  <button class="danger" onclick="clearQuestions()">Clear All Questions</button>

  <div class="question-list" id="questionList"></div>

</div>

<script>
  if(localStorage.getItem("adminLoggedIn") !== "yes"){
  window.location.href = "admin-login.html";
}
function addQuestion(){

  let question =
    document.getElementById("question").value;

  let option1 =
    document.getElementById("option1").value;

  let option2 =
    document.getElementById("option2").value;

  let option3 =
    document.getElementById("option3").value;

  let option4 =
    document.getElementById("option4").value;

  let answer =
    document.getElementById("answer").value;
    let image =
document.getElementById("image").value;

let category =
document.getElementById("category").value;
  if(
    question === "" ||
    option1 === "" ||
    option2 === "" ||
    option3 === "" ||
    option4 === "" ||
    answer === "" ||
category === ""
  ){
    alert("Please fill all fields");
    return;
  }

  let adminQuestions =
    JSON.parse(localStorage.getItem("adminQuestions")) || [];

 adminQuestions.push({
  q: question,
  options: [option1, option2, option3, option4],
  answer: Number(answer),
  image: image,
  category: category,

  testType:
    document.getElementById("testType").value
});

  localStorage.setItem(
    "adminQuestions",
    JSON.stringify(adminQuestions)
  );

  alert("Question Added Successfully");

  document.getElementById("question").value = "";
  document.getElementById("option1").value = "";
  document.getElementById("option2").value = "";
  document.getElementById("option3").value = "";
  document.getElementById("option4").value = "";
  document.getElementById("answer").value = "";

  showQuestions();
}

function showQuestions(){

  let adminQuestions =
    JSON.parse(localStorage.getItem("adminQuestions")) || [];

  let list =
    document.getElementById("questionList");

  list.innerHTML =
    "<h2>Total Questions: " + adminQuestions.length + "</h2>";

  adminQuestions.forEach((q,index)=>{

    list.innerHTML += `
      <div class="q-card">
        <h3>
Q${index + 1}. ${q.q}
</h3>

<p>
<b>Category:</b> ${q.category}
</p>
        <p>A. ${q.options[0]}</p>
        <p>B. ${q.options[1]}</p>
        <p>C. ${q.options[2]}</p>
        <p>D. ${q.options[3]}</p>
        <b>Correct: ${q.options[q.answer]}</b>
      </div>
    `;

  });
}

function clearQuestions(){

  let confirmClear =
    confirm("Are you sure you want to delete all questions?");

  if(confirmClear){
    localStorage.removeItem("adminQuestions");
    showQuestions();
  }
}
function importPDFQuestions(){

  let text = document.getElementById("pdfText").value;

  if(text.trim() === ""){
    alert("Please read PDF first");
    return;
  }

  let imported = [];

  let pattern =
    /(Section\s*:\s*([\s\S]*?))?Q\.\s*\d+\s+([\s\S]*?)\s+Ans\s+1\.\s*([\s\S]*?)\s+2\.\s*([\s\S]*?)\s+3\.\s*([\s\S]*?)\s+4\.\s*([\s\S]*?)(?=Q\.\s*\d+|Section\s*:|Test Date|$)/g;

  let currentCategory = "General Awareness";
  let match;

  while((match = pattern.exec(text)) !== null){

    let sectionText = match[2];

    if(sectionText){
      let cleanSection = sectionText.trim();

      if(cleanSection.includes("Mathematics")){
        currentCategory = "Maths";
      }
      else if(cleanSection.includes("Reasoning")){
        currentCategory = "Reasoning";
      }
      else if(cleanSection.includes("General Awareness")){
        currentCategory = "General Awareness";
      }
      else if(cleanSection.includes("Science")){
        currentCategory = "General Science";
      }
    }

    imported.push({
      q: match[3].trim(),
      options: [
        match[4].trim(),
        match[5].trim(),
        match[6].trim(),
        match[7].trim()
      ],
      answer: 0,
      image: "",
      category: currentCategory
    });

  }

  if(imported.length === 0){
    alert("Questions not detected. First read PDF again, then import.");
    return;
  }

  localStorage.setItem("adminQuestions", JSON.stringify(imported));

  alert(imported.length + " questions imported with sections successfully");

  showQuestions();
}
showQuestions();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>
async function readPDF(){

  const file = document.getElementById("pdfFile").files[0];

  if(!file){
    alert("Please select PDF file");
    return;
  }

  const fileReader = new FileReader();

  fileReader.onload = async function(){

    const typedArray = new Uint8Array(this.result);

    const pdf = await pdfjsLib.getDocument(typedArray).promise;

    let fullText = "";

    for(let pageNum = 1; pageNum <= pdf.numPages; pageNum++){

      const page = await pdf.getPage(pageNum);
      const textContent = await page.getTextContent();

      const pageText = textContent.items
        .map(item => item.str)
        .join(" ");

      fullText += pageText + "\n\n";
    }

    document.getElementById("pdfText").value = fullText;

    alert("PDF text loaded successfully");
  };

  fileReader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
