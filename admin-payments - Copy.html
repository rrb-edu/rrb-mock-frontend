<!DOCTYPE html>
<html>
<head>
  <title>Admin Payments</title>
  <style>
    body{font-family:Arial;background:#f1f5f9;padding:30px;}
    .box{background:white;padding:30px;border-radius:20px;}
    h1{color:#2563eb;}
    table{width:100%;border-collapse:collapse;}
    th,td{padding:12px;border-bottom:1px solid #ddd;text-align:center;}
    th{background:#2563eb;color:white;}
  </style>
</head>
<body>

<div class="box">
  <h1>Payment Dashboard</h1>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Amount</th>
        <th>Payment ID</th>
        <th>Date</th>
      </tr>
    </thead>

    <tbody id="paymentBody"></tbody>
  </table>
</div>

<script>
async function loadPayments(){

  const res = await fetch(
    "https://rrb-mock-backend.onrender.com/api/payments/all"
  );

  const payments = await res.json();

  let body = document.getElementById("paymentBody");

  payments.forEach(p => {
    body.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.email}</td>
        <td>₹${p.amount}</td>
        <td>${p.paymentId}</td>
        <td>${new Date(p.createdAt).toLocaleString()}</td>
      </tr>
    `;
  });
}

loadPayments();
</script>

</body>
</html>
